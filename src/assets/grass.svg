<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grassBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86d96a"/>
      <stop offset="45%" stop-color="#63be4d"/>
      <stop offset="100%" stop-color="#2f7e2a"/>
    </linearGradient>

    <radialGradient id="lightPatch" cx="50%" cy="12%" r="70%">
      <stop offset="0%" stop-color="#c8f29e" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#9fdb74" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6db753" stop-opacity="0"/>
    </radialGradient>

    <pattern id="bladesNear" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M8 82 C12 55 16 38 21 82 Z" fill="#246a1f"/>
      <path d="M22 82 C27 53 31 30 37 82 Z" fill="#2f8028"/>
      <path d="M40 82 C44 56 49 35 55 82 Z" fill="#3f9640"/>
      <path d="M56 82 C60 58 64 40 69 82 Z" fill="#2b7524"/>
      <path d="M68 82 C72 59 76 44 80 82 Z" fill="#4ea24b"/>
    </pattern>

    <pattern id="bladesFar" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M10 118 C16 78 22 56 30 118 Z" fill="#2b7624"/>
      <path d="M34 118 C40 80 46 52 54 118 Z" fill="#3b8c33"/>
      <path d="M62 118 C68 84 74 58 81 118 Z" fill="#2a7023"/>
      <path d="M86 118 C92 80 98 50 106 118 Z" fill="#4a9d44"/>
      <path d="M108 118 C113 86 117 64 120 118 Z" fill="#2f7f29"/>
    </pattern>

    <pattern id="mowLines" width="220" height="220" patternUnits="userSpaceOnUse">
      <path d="M0 30 C60 15 160 15 220 30" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8" fill="none"/>
      <path d="M0 140 C70 122 150 122 220 140" stroke="#ffffff" stroke-opacity="0.06" stroke-width="10" fill="none"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#grassBase)"/>
  <rect width="1600" height="900" fill="url(#lightPatch)"/>
  <rect width="1600" height="900" fill="url(#bladesFar)" opacity="0.45"/>
  <rect width="1600" height="900" fill="url(#bladesNear)" opacity="0.64"/>
  <rect width="1600" height="900" fill="url(#mowLines)" opacity="0.65"/>

  <g opacity="0.16">
    <ellipse cx="230" cy="710" rx="170" ry="72" fill="#1f5b1b"/>
    <ellipse cx="700" cy="640" rx="210" ry="88" fill="#245f20"/>
    <ellipse cx="1180" cy="745" rx="180" ry="76" fill="#1d5318"/>
    <ellipse cx="1430" cy="610" rx="140" ry="60" fill="#2a6e25"/>
  </g>
</svg>
